<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐢 vs 🎨 推論猜謎對決 - 討論聊天室</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin: 20px 0;
        }
        .player-score {
            text-align: center;
            padding: 15px 30px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
        }
        .player-score.zeni { border: 3px solid #4ade80; }
        .player-score.designer { border: 3px solid #f472b6; }
        .player-score h2 { font-size: 1.5em; }
        .player-score .score { font-size: 3em; font-weight: bold; }
        .zeni .score { color: #4ade80; }
        .designer .score { color: #f472b6; }
        
        .chat-container {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 20px;
        }
        .message {
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 10px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.zeni { background: rgba(74,222,128,0.2); border-left: 4px solid #4ade80; }
        .message.designer { background: rgba(244,114,182,0.2); border-left: 4px solid #f472b6; }
        .message.system { background: rgba(255,255,255,0.1); text-align: center; font-style: italic; }
        .message .sender { font-weight: bold; margin-bottom: 5px; }
        .message .content { margin-top: 5px; white-space: pre-wrap; }
        
        .question-box {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            font-family: monospace;
            white-space: pre-wrap;
        }
        .judge-section {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .judge-section h3 { margin-bottom: 15px; font-size: 1.3em; }
        .judge-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
        }
        .judge-btn {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .judge-btn:hover { transform: scale(1.05); }
        .judge-btn.zeni { background: #4ade80; color: #000; }
        .judge-btn.designer { background: #f472b6; color: #000; }
        .judge-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .game-status {
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .round-indicator {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            margin: 0 10px;
        }
        
        .winner-display {
            font-size: 1.5em;
            font-weight: bold;
            padding: 20px;
            margin: 20px 0;
            border-radius: 15px;
        }
        .winner-display.zeni { background: rgba(74,222,128,0.3); color: #4ade80; }
        .winner-display.designer { background: rgba(244,114,182,0.3); color: #f472b6; }
        .winner-display.draw { background: rgba(255,255,255,0.2); color: #fff; }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐢 vs 🎨 推論猜謎對決</h1>
            <p>傑尼 與 迪尼 的頭腦風暴比賽</p>
        </header>
        
        <div class="game-status">
            <span class="round-indicator">📋 規則</span>
            輪流出題 → 答對+1分 → 5回合後結算 → 用戶評判誰勝利 👑
        </div>
        
        <div class="scoreboard">
            <div class="player-score zeni">
                <h2>🐢 傑尼</h2>
                <div class="score" id="zeni-score">0</div>
                <div>分數</div>
            </div>
            <div class="player-score designer">
                <h2>🎨 迪尼</h2>
                <div class="score" id="designer-score">0</div>
                <div>分數</div>
            </div>
        </div>
        
        <div class="chat-container" id="chat-container">
            <div class="loading">⏳ 載入中...</div>
        </div>
        
        <div class="judge-section" id="judge-section" style="display: none;">
            <h3>👑 用戶裁判時間！</h3>
            <p>根據雙方表現，你認為誰赢得這場比賽？</p>
            <div class="judge-buttons">
                <button class="judge-btn zeni" onclick="declareWinner('zeni')">🐢 傑尼勝利！</button>
                <button class="judge-btn designer" onclick="declareWinner('designer')">🎨 迪尼勝利！</button>
                <button class="judge-btn" onclick="declareWinner('draw')" style="background: #a1a1aa; color: #000;">🤝 平手！</button>
            </div>
            <div id="winner-result"></div>
        </div>
    </div>
    
    <script>
        // 遊戲狀態
        let gameState = {
            round: 1,
            maxRounds: 5,
            currentQuestioner: 'zeni',
            zeniScore: 0,
            designerScore: 0,
            questions: [],
            gameOver: false
        };
        
        // 自動偵測伺服器地址
        const API_HOST = window.location.hostname || 'localhost';
        const API_BASE = `http://${API_HOST}:3001/api`;
        
        // 添加訊息到聊天室
        function addMessage(sender, content, type = 'message') {
            const container = document.getElementById('chat-container');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = `
                <div class="sender">${sender}</div>
                <div class="content">${content}</div>
            `;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        // 更新分數
        function updateScores() {
            document.getElementById('zeni-score').textContent = gameState.zeniScore;
            document.getElementById('designer-score').textContent = gameState.designerScore;
        }
        
        // 渲染所有歷史訊息
        function renderAllMessages() {
            const container = document.getElementById('chat-container');
            container.innerHTML = '';
            
            gameState.questions.forEach(q => {
                // 題目訊息
                addMessage((q.questioner === 'zeni' ? '🐢 傑尼' : '🎨 迪尼') + ' 的題目', q.question, 'message ' + q.questioner);
                
                if (q.answer) {
                    // 答題訊息
                    addMessage((q.answerer === 'zeni' ? '🐢 傑尼' : '🎨 迪尼') + ' 的答案', q.answer, 'message ' + q.answerer);
                    
                    // 評分訊息
                    const answererName = q.answerer === 'zeni' ? '🐢 傑尼' : '🎨 迪尼';
                    const scoreMsg = q.correct ? 
                        `✅ 正確！${answererName} 得 1 分！` :
                        `❌ 錯誤！正確答案是：${q.correctAnswer}`;
                    addMessage('裁判', scoreMsg, 'system');
                }
            });
        }
        
        // 從伺服器載入遊戲狀態
        async function loadGameState() {
            try {
                const res = await fetch(API_BASE + '/state');
                if (!res.ok) throw new Error('Server error');
                gameState = await res.json();
                updateScores();
                renderAllMessages();
                if (gameState.gameOver) {
                    showJudgeSection();
                }
            } catch (e) {
                document.getElementById('chat-container').innerHTML = `
                    <div class="message system">
                        <div class="content">⚠️ 無法連接伺服器<br>
                        請在工作終端執行：<br>
                        <code>cd /workspace/chat-arena && node server.js</code><br>
                        然後刷新此頁面</div>
                    </div>
                `;
            }
        }
        
        // 顯示裁判區塊
        function showJudgeSection() {
            document.getElementById('judge-section').style.display = 'block';
            
            const winnerClass = gameState.zeniScore > gameState.designerScore ? 'zeni' : 
                (gameState.designerScore > gameState.zeniScore ? 'designer' : 'draw');
            const finalScore = `
                <div class="winner-display ${winnerClass}">
                    🏆 比賽結束！<br>
                    最終比分：🐢 傑尼 ${gameState.zeniScore} vs 🎨 迪尼 ${gameState.designerScore}
                </div>
            `;
            document.getElementById('winner-result').innerHTML = finalScore;
        }
        
        // 評判勝利者
        function declareWinner(winner) {
            let resultMsg = '';
            if (winner === 'zeni') {
                resultMsg = '👑 你判定：🐢 傑尼 獲勝！';
            } else if (winner === 'designer') {
                resultMsg = '👑 你判定：🎨 迪尼 獲勝！';
            } else {
                resultMsg = '👑 你判定：🤝 雙方平手！';
            }
            
            addMessage('👑 用戶裁判', resultMsg, 'system');
            
            // 禁用按鈕
            document.querySelectorAll('.judge-btn').forEach(btn => btn.disabled = true);
        }
        
        // 初始化
        loadGameState();
        
        // 每 3 秒自動刷新遊戲狀態
        setInterval(loadGameState, 3000);
    </script>
</body>
</html>
