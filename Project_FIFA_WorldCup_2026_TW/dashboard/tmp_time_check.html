<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Time Check</title>
</head>
<body>
<div id="out"></div>
<script>
function nowTaiwan() {
  const d = new Date();
  const s = d.toLocaleString('en-US', { timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  return new Date(s);
}
function taiwanDateTime(dateStr, timeStr) {
  return new Date(`${dateStr}T${timeStr}:00+08:00`);
}
const m = { date: '2026-06-22', time_taiwan: '03:00' };
const kickoff = taiwanDateTime(m.date, m.time_taiwan);
const now = nowTaiwan();
const finished = false;
const live = now >= kickoff && now <= new Date(kickoff.getTime() + 2*3600*1000) && !finished;
document.getElementById('out').innerHTML =
  'nowTaiwan: ' + now.toLocaleString('zh-TW', {timeZone:'Asia/Taipei'}) + '<br>' +
  'raw new Date: ' + new Date().toLocaleString('zh-TW') + '<br>' +
  '#38 kickoff: ' + kickoff.toLocaleString('zh-TW', {timeZone:'Asia/Taipei'}) + '<br>' +
  'isLive #38: ' + live;
</script>
</body>
</html>
